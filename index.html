 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adaptavist Group | Event Portal</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
       Got it, let's make that Adaptavist Orange absolute king of the UI.

We will invert the color hierarchy so the deep slate is used subtly for backgrounds, while that unmistakable signature orange dominates the primary headers, buttons, and focal elements.

Open your index.html file on GitHub, find the <style> section, and completely replace it with this bright, brand-accurate stylesheet:

CSS
:root {
    --brand-orange: #f97316;     /* Primary Adaptavist Orange */
    --brand-orange-hover: #ea580c;
    --bg-slate: #0f172a;         /* Deep Slate Gray */
    --card-bg: #ffffff;
    --input-border: #cbd5e1;
    --text-main: #1e293b;
    --brand-text: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background-color: var(--bg-slate); /* Dark mode background pops the orange card */
    color: var(--text-main); 
    line-height: 1.5; 
    padding: 10px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh; 
}
.app-card { 
    width: 100%; 
    max-width: 550px; 
    background: var(--card-bg); 
    border-radius: 12px; 
    overflow: hidden; 
    box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
    border: 1px solid rgba(255,255,255,0.1); 
}
.header { 
    background: var(--brand-orange); /* Orange is now the main header color */
    color: var(--brand-text); 
    padding: 28px 20px; 
    text-align: center; 
}
.header h1 { 
    font-size: 1.6rem; 
    font-weight: 800; 
    letter-spacing: -0.025em; 
}
.header p { 
    color: rgba(255, 255, 255, 0.8); 
    font-size: 0.9rem; 
    margin-top: 4px; 
    font-weight: 500;
}
.content { padding: 24px; }
.btn { 
    display: inline-flex; 
    align-items: center; 
    justify-content: center; 
    width: 100%; 
    padding: 14px; 
    font-size: 1rem; 
    font-weight: 700; 
    border-radius: 8px; 
    border: none; 
    cursor: pointer; 
    transition: all 0.2s ease; 
    margin-top: 10px; 
}
.btn-primary { 
    background: var(--brand-orange); 
    color: white; 
}
.btn-primary:hover { 
    background: var(--brand-orange-hover); 
}
.btn-accent { 
    background: var(--brand-orange); 
    color: white; 
    box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
}
.btn-accent:hover { 
    background: var(--brand-orange-hover); 
    box-shadow: 0 6px 16px rgba(249, 115, 22, 0.3);
}
#scanner-section, #review-section { display: none; }
#reader { 
    width: 100%; 
    border: 2px solid #e2e8f0; 
    border-radius: 8px; 
    overflow: hidden; 
}
.form-group { margin-bottom: 16px; text-align: left; }
label { 
    display: block; 
    font-size: 0.875rem; 
    font-weight: 700; 
    color: #475569; 
    margin-bottom: 6px; 
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
input[type="text"] { 
    width: 100%; 
    padding: 12px; 
    border: 1px solid var(--input-border); 
    border-radius: 6px; 
    font-size: 1rem; 
    color: var(--text-main); 
    background-color: #f8fafc; 
    transition: all 0.2s; 
}
input[type="text"]:focus { 
    outline: none; 
    border-color: var(--brand-orange); 
    background-color: #fff; 
    box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
}
.status-box { 
    margin-top: 16px; 
    padding: 14px; 
    font-weight: 700; 
    border-radius: 6px; 
    text-align: center; 
    font-size: 0.95rem; 
    display: none; 
}
.success { 
    display: block; 
    background: #f0fdf4; 
    color: #166534; 
    border: 1px solid #bbf7d0; 
}
.error { 
    display: block; 
    background: #fef2f2; 
    color: #991b1b; 
    border: 1px solid #fca5a5; 
}
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header">
            <h1>The Adaptavist Group</h1>
            <p>Secure Event Access Management</p>
        </div>

        <div class="content">
            <div id="login-section">
                <div style="margin-bottom: 20px; text-align: center;">
                    <div id="g_id_onload"
                         data-client_id="391161511150-ejvh658fsqb4cato9a58iq1ad4l3olsh.apps.googleusercontent.com"
                         data-context="signin"
                         data-ux_mode="popup"
                         data-callback="handleGoogleLogin"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-size="large"></div>
                </div>
            </div>

            <div id="scanner-section">
                <div id="reader"></div>
                <button class="btn btn-primary" onclick="simulateScan()" style="margin-top:20px; font-size:0.85rem; padding:8px;">[Test Mode] Simulate Valid Scan</button>
            </div>

            <div id="review-section">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="field-firstname" readonly>
                </div>
                <div class="form-group">
                    <label>Second Name</label>
                    <input type="text" id="field-lastname" readonly>
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="field-company" readonly>
                </div>
                <div class="form-group">
                    <label>Account Manager</label>
                    <input type="text" id="field-am" readonly>
                </div>
                <button class="btn btn-accent" id="confirm-btn" onclick="commitAttendance()">Confirm Attendance</button>
            </div>

            <div id="status-message" class="status-box"></div>
        </div>
    </div>

    <script>
        const SCRIPTRUNNER_URL = "https://event.scriptrunnerconnect.com/htdmrgfevkndryj2hcs765";
        
        let googleToken = "";
        let currentTicketToken = "";
        let isProcessing = false;
        let html5QrcodeScanner = null;

        function handleGoogleLogin(response) {
            googleToken = response.credential;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('scanner-section').style.display = 'block';
            startCamera();
        }

        function startCamera() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} });
            html5QrcodeScanner.render(onCameraReadsCode, function(err){});
        }

        function onCameraReadsCode(decodedText) {
            if (isProcessing) return;
            isProcessing = true;
            currentTicketToken = decodedText;
            showStatus("Verifying ticket signature...", "");
            sendDataToBackend("lookup", currentTicketToken);
        }

        async function sendDataToBackend(actionType, ticketToken) {
            try {
                const response = await fetch(SCRIPTRUNNER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        action: actionType, // "lookup" or "confirm"
                        googleToken: googleToken,
                        ticketToken: ticketToken
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showStatus("❌ Error: " + data.error, "error");
                    isProcessing = false;
                    return;
                }

                if (actionType === "lookup") {
                    hideStatus();
                    // Pause the active camera scanning interface
                    if(html5QrcodeScanner) html5QrcodeScanner.clear();
                    
                    // Populate fields
                    document.getElementById('field-firstname').value = data.firstName || '';
                    document.getElementById('field-lastname').value = data.lastName || '';
                    document.getElementById('field-company').value = data.company || '';
                    document.getElementById('field-am').value = data.accountManager || '';
                    
                    // Transition view layouts
                    document.getElementById('scanner-section').style.display = 'none';
                    document.getElementById('review-section').style.display = 'block';
                } else if (actionType === "confirm") {
                    showStatus("✅ Checked In Successfully!", "success");
                    setTimeout(() => {
                        resetToScanner();
                    }, 2000);
                }
            } catch (error) {
                showStatus("❌ Network Error: Configuration mismatch or platform issue.", "error");
                isProcessing = false;
            }
        }

        function commitAttendance() {
            document.getElementById('confirm-btn').disabled = true;
            showStatus("Syncing attendance with HubSpot...", "");
            sendDataToBackend("confirm", currentTicketToken);
        }

        function resetToScanner() {
            // Clear current working state values
            currentTicketToken = "";
            isProcessing = false;
            document.getElementById('confirm-btn').disabled = false;
            hideStatus();
            
            // Empty all form fields
            document.getElementById('field-firstname').value = '';
            document.getElementById('field-lastname').value = '';
            document.getElementById('field-company').value = '';
            document.getElementById('field-am').value = '';

            // Transition visibility blocks back to scanner mode
            document.getElementById('review-section').style.display = 'none';
            document.getElementById('scanner-section').style.display = 'block';
            startCamera();
        }

        function showStatus(msg, type) {
            const box = document.getElementById('status-message');
            box.innerText = msg;
            box.className = "status-box " + type;
        }
        function hideStatus() { document.getElementById('status-message').style.display = 'none'; }
        function simulateScan() {
            const testJwt = prompt("Paste your Test JWT here:");
            if(testJwt) onCameraReadsCode(testJwt);
        }
    </script>
</body>
</html>
