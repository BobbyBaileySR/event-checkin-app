<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptavist Event Portal</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* ---------------------------------------------------------
           BRAND IDENTITY COLORS (THE ADAPTAVIST SYSTEM)
           --------------------------------------------------------- */
        :root {
            --adaptavist-orange: #f97316;
            --adaptavist-orange-hover: #ea580c;
            --deep-slate-bg: #0f172a;
            --pure-white-card: #ffffff;
            --form-text: #1e293b;
            --border-gray: #cbd5e1;
        }

        /* ---------------------------------------------------------
           RESPONSIVE BASE LAYOUT
           --------------------------------------------------------- */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--deep-slate-bg); 
            color: var(--form-text); 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .app-container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--pure-white-card); 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
        }

        /* ---------------------------------------------------------
           DOMINANT ORANGE HEADER BLOCK
           --------------------------------------------------------- */
        .brand-header { 
            background-color: var(--adaptavist-orange) !important; 
            color: #ffffff !important; 
            padding: 35px 20px; 
            text-align: center;
        }

        .brand-header h1 { 
            font-size: 1.75rem; 
            font-weight: 800; 
            letter-spacing: -0.03em;
        }

        .brand-header p { 
            color: rgba(255, 255, 255, 0.9); 
            font-size: 0.95rem; 
            margin-top: 6px; 
            font-weight: 500;
        }

        .app-body { 
            padding: 28px; 
        }

        /* ---------------------------------------------------------
           COMPONENTS & INTERFACE ELEMENTS
           --------------------------------------------------------- */
        .action-button { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 14px; 
            font-size: 1rem; 
            font-weight: 700; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            transition: background 0.15s ease; 
            background-color: var(--adaptavist-orange);
            color: #ffffff;
            margin-top: 10px;
        }

        .action-button:hover { 
            background-color: var(--adaptavist-orange-hover); 
        }

        .action-button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        /* Style elements generated dynamically by the QR Library */
        #reader { 
            border: 2px dashed var(--border-gray) !important; 
            border-radius: 8px; 
            padding: 15px !important;
        }

        #reader button {
            background-color: var(--adaptavist-orange) !important;
            color: white !important;
            border: none !important;
            padding: 10px 15px !important;
            font-weight: 700 !important;
            border-radius: 6px !important;
            cursor: pointer;
        }

        /* ---------------------------------------------------------
           DATA REVIEW FORM LOOKS
           --------------------------------------------------------- */
        .field-group { 
            margin-bottom: 16px; 
            text-align: left; 
        }

        label { 
            display: block; 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: #475569; 
            margin-bottom: 6px; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-gray); 
            border-radius: 6px; 
            font-size: 1rem; 
            color: var(--form-text); 
            background-color: #f8fafc; 
        }

        /* ---------------------------------------------------------
           VISIBILITY CONTROLS & STATE ALERTS
           --------------------------------------------------------- */
        .hidden { 
            display: none !important; 
        }

        .notification-tray { 
            margin-top: 16px; 
            padding: 14px; 
            font-weight: 700; 
            border-radius: 6px; 
            text-align: center; 
            font-size: 0.95rem; 
        }
        .info { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand-header">
            <h1>Adaptavist</h1>
            <p>Event Access Controller</p>
        </div>

        <div class="app-body">
            
            <div id="login-section">
                <p style="text-align: center; margin-bottom: 20px; color: #64748b; font-weight: 500;">
                    Authentication Required to Launch Scanner
                </p>
                <div style="display: flex; justify-content: center;">
                    <div id="g_id_onload"
                         data-client_id="391161511150-ejvh658fsqb4cato9a58iq1ad4l3olsh.apps.googleusercontent.com"
                         data-context="signin"
                         data-ux_mode="popup"
                         data-callback="handleGoogleLogin"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-size="large"></div>
                </div>
            </div>

            <div id="scanner-section" class="hidden">
                <div id="reader"></div>
                <button class="action-button" onclick="simulateScan()" style="font-size: 0.8rem; padding: 8px; margin-top: 15px; background-color: #475569;">
                    [Test Mode] Inject Mock JWT
                </button>
            </div>

            <div id="review-section" class="hidden">
                <div class="field-group">
                    <label>First Name</label>
                    <input type="text" id="field-firstname" readonly>
                </div>
                <div class="field-group">
                    <label>Second Name</label>
                    <input type="text" id="field-lastname" readonly>
                </div>
                <div class="field-group">
                    <label>Company</label>
                    <input type="text" id="field-company" readonly>
                </div>
                <div class="field-group">
                    <label>Account Manager</label>
                    <input type="text" id="field-am" readonly>
                </div>
                <button class="action-button" id="confirm-btn" onclick="commitAttendance()">Confirm Attendance</button>
            </div>

            <div id="status-message" class="notification-tray hidden"></div>

        </div>
    </div>

    <script>
        // CONFIGURATION ROUTE PIN
        const SCRIPTRUNNER_URL = "https://event.scriptrunnerconnect.com/htdmrgfevkndryj2hcs765";
        
        let googleToken = "";
        let currentTicketToken = "";
        let isProcessing = false;
        let html5QrcodeScanner = null;

        // -----------------------------------------------------
        // STEP 1: Handle Google Authentication Success Execution
        // -----------------------------------------------------
        function handleGoogleLogin(response) {
            googleToken = response.credential;
            
            // Toggle Display Blocks State Cleanly
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('scanner-section').classList.remove('hidden');
            
            startCamera();
        }

        // -----------------------------------------------------
        // STEP 2: Instantiating the Optical Engine
        // -----------------------------------------------------
        function startCamera() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: { width: 250, height: 250 } 
            });
            html5QrcodeScanner.render(onCameraReadsCode, function(err){});
        }

        // -----------------------------------------------------
        // STEP 3: Route Scanned Code Inputs
        // -----------------------------------------------------
        function onCameraReadsCode(decodedText) {
            if (isProcessing) return;
            isProcessing = true;
            
            currentTicketToken = decodedText;
            showStatus("Verifying ticket signature with middleware...", "info");
            sendDataToBackend("lookup", currentTicketToken);
        }

        // -----------------------------------------------------
        // STEP 4: Network Stream Execution (CORS Bypass Mode)
        // -----------------------------------------------------
        async function sendDataToBackend(actionType, ticketToken) {
            try {
                const response = await fetch(SCRIPTRUNNER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' }, // Standard text simple stream bypasses CORS OPTIONS
                    body: JSON.stringify({
                        action: actionType,
                        googleToken: googleToken,
                        ticketToken: ticketToken
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showStatus("❌ Authorization Failure: " + data.error, "error");
                    isProcessing = false;
                    return;
                }

                if (actionType === "lookup") {
                    hideStatus();
                    if (html5QrcodeScanner) html5QrcodeScanner.clear();
                    
                    // Assign properties directly down into text inputs
                    document.getElementById('field-firstname').value = data.firstName || '';
                    document.getElementById('field-lastname').value = data.lastName || '';
                    document.getElementById('field-company').value = data.company || '';
                    document.getElementById('field-am').value = data.accountManager || '';
                    
                    // Toggle visibility sets
                    document.getElementById('scanner-section').classList.add('hidden');
                    document.getElementById('review-section').classList.remove('hidden');
                    
                } else if (actionType === "confirm") {
                    showStatus("✅ Verification Passed. HubSpot Updated!", "success");
                    setTimeout(() => {
                        resetToScanner();
                    }, 2000);
                }
            } catch (error) {
                showStatus("❌ Core Link Failure: ScriptRunner server unreachable.", "error");
                isProcessing = false;
            }
        }

        // -----------------------------------------------------
        // STEP 5: Dispatch Confirmation Updates to HubSpot
        // -----------------------------------------------------
        function commitAttendance() {
            document.getElementById('confirm-btn').disabled = true;
            showStatus("Writing attendance validation state to HubSpot...", "info");
            sendDataToBackend("confirm", currentTicketToken);
        }

        // -----------------------------------------------------
        // STEP 6: Refresh System State Configuration
        // -----------------------------------------------------
        function resetToScanner() {
            currentTicketToken = "";
            isProcessing = false;
            document.getElementById('confirm-btn').disabled = false;
            hideStatus();
            
            // Empty all text elements out fully
            document.getElementById('field-firstname').value = '';
            document.getElementById('field-lastname').value = '';
            document.getElementById('field-company').value = '';
            document.getElementById('field-am').value = '';

            // Transition UI displays back to start point
            document.getElementById('review-section').classList.add('hidden');
            document.getElementById('scanner-section').classList.remove('hidden');
            startCamera();
        }

        // -----------------------------------------------------
        // VISIBILITY TRACKING UTILITY OPERATIONS
        // -----------------------------------------------------
        function showStatus(msg, statusClass) {
            const box = document.getElementById('status-message');
            box.innerText = msg;
            box.className = "notification-tray " + statusClass;
        }

        function hideStatus() { 
            document.getElementById('status-message').classList.add('hidden'); 
        }

        function simulateScan() {
            const testJwt = prompt("Paste your Test JWT here:");
            if(testJwt) onCameraReadsCode(testJwt);
        }
    </script>
</body>
</html>
